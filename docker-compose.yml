networks:
  soc-frontend:
    name: ${DOCKER_NETWORK_FRONTEND}
    driver: bridge
  soc-backend:
    name: ${DOCKER_NETWORK_BACKEND}
    driver: bridge

volumes:
  wazuh-data:
    name: ${WAZUH_DATA_VOLUME}
  grafana-data:
    name: ${GRAFANA_DATA_VOLUME}
  thehive-data:
    name: ${THEHIVE_DATA_VOLUME}
  cassandra-data:
    name: ${CASSANDRA_DATA_VOLUME}

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    container_name: wazuh-manager
    ports:
      - "${WAZUH_MANAGER_PORT_UDP}:1514/udp"
      - "${WAZUH_MANAGER_PORT_TCP}:1515/tcp"
      - "${WAZUH_API_PORT}:55000/tcp"
    networks:
      - soc-backend
    volumes:
      - ${WAZUH_DATA_VOLUME}:/var/ossec/data
    environment:
      - TZ=UTC
    restart: unless-stopped

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.0
    container_name: wazuh-dashboard
    ports:
      - "${WAZUH_DASHBOARD_PORT}:5601"
    networks:
      - soc-frontend
    environment:
      - WAZUH_API_URL=http://wazuh-manager:55000
      - WAZUH_API_USERNAME=${WAZUH_ADMIN_USER}
      - WAZUH_API_PASSWORD=${WAZUH_ADMIN_PASSWORD}
      - TZ=UTC
    restart: unless-stopped

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    networks:
      - soc-backend
    volumes:
      - ${CASSANDRA_DATA_VOLUME}:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME}
      - CASSANDRA_DC=${CASSANDRA_DC_NAME}
      - CASSANDRA_RACK=rack1
      - CASSANDRA_SEEDS=cassandra
      - TZ=UTC
    restart: unless-stopped

  thehive:
    image: strangebee/thehive:5.1.2
    container_name: thehive
    ports:
      - "${THEHIVE_PORT}:9000"
    networks:
      - soc-frontend
      - soc-backend
    volumes:
      - ${THEHIVE_DATA_VOLUME}:/data
    environment:
      - TH_SECRET=${THEHIVE_API_KEY}
      - CASSANDRA_SEED_PROVIDER=org.apache.cassandra.locator.SimpleSeedProvider
      - CASSANDRA_SEEDS=cassandra
      - TZ=UTC
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - soc-frontend
    volumes:
      - ${GRAFANA_DATA_VOLUME}:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=${GF_INSTALL_PLUGINS}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
      - TZ=UTC
    restart: unless-stopped
